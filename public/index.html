<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVIF Converter - High Performance Image Compression</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 0.75rem;
            padding: 3rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background-color: rgba(37, 99, 235, 0.05);
        }

        .upload-area p {
            margin: 0;
            font-weight: 500;
        }

        #fileInput {
            display: none;
        }

        .controls {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        .quality-value {
            float: right;
            font-weight: 600;
            color: var(--primary);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            min-height: 1.25rem;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .file-info {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--success);
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📸 AVIF Converter</h1>
            <p>Convert JPG/PNG to high-quality AVIF</p>

            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p id="dropText">Click or drag image here</p>
                <div class="file-info" id="fileInfo"></div>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
            </div>

            <div class="controls">
                <label>Quality: <span class="quality-value" id="qualityVal">80</span></label>
                <input type="range" id="quality" min="1" max="100" value="80" oninput="document.getElementById('qualityVal').textContent = this.value">
            </div>

            <button id="convertBtn" disabled>
                <div class="loader" id="loader"></div>
                <span id="btnText">Convert & Download</span>
            </button>

            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const fileInfo = document.getElementById('fileInfo');
        const dropText = document.getElementById('dropText');

        let selectedFile = null;

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                fileInfo.textContent = `Selected: ${selectedFile.name}`;
                fileInfo.style.display = 'block';
                dropText.style.display = 'none';
                convertBtn.disabled = false;
                status.textContent = '';
            }
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const quality = document.getElementById('quality').value;
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('quality', quality);

            // UI State
            convertBtn.disabled = true;
            loader.style.display = 'block';
            btnText.textContent = 'Converting...';
            status.textContent = 'Processing your image...';

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Conversion failed');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // Get filename from response header or use default
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = 'converted.avif';
                if (contentDisposition && contentDisposition.includes('filename=')) {
                    filename = contentDisposition.split('filename=')[1].replace(/"/g, '');
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                status.textContent = 'Success! Your AVIF is downloaded.';
                status.style.color = 'var(--success)';
            } catch (err) {
                console.error(err);
                status.textContent = 'Error: ' + err.message;
                status.style.color = '#ef4444';
            } finally {
                convertBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Convert & Download';
            }
        });
    </script>
</body>
</html>
